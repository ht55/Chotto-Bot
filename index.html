<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chotto Bot - 2.5 Flash BYOK Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #d7dec9;
            color: #1f2937;
        }

        #app {
            background: #d3d3d3;
            border-radius: 28px;
            box-shadow:
                10px 10px 20px rgba(0, 0, 0, 0.5),
                -10px -10px 20px rgba(0, 0, 0, 0.5);
            border: none;
        }

        header, footer {
            background: transparent;
            border: none;
        }

        h1 {
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #111;
        }

        /* ===== ボタン（ニューモーフィズム） ===== */
        .style-btn {
            background: #9aa47e;
            border-radius: 999px;
            box-shadow:
                6px 6px 12px rgba(0, 0, 0, 0.268),
                -6px -6px 12px rgba(255,255,255,0.8);
            border: none;
            color: #444;
            transition: all 0.2s ease;
        }

        .style-btn:hover {
            box-shadow:
                inset 4px 4px 8px rgba(0,0,0,0.12),
                inset -4px -4px 8px rgba(255,255,255,0.8);
        }

        .style-btn.ring-4 {
            box-shadow:
                inset 6px 6px 12px rgba(0,0,0,0.15),
                inset -6px -6px 12px rgba(255,255,255,0.9);
            color: #111;
            font-weight: 600;
        }

        /* ===== チャット背景 ===== */
        #chat-transcript {
            background: transparent;
        }

        /* ===== バブル ===== */
        .chat-bubble {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.6;
            background: #e9ecef;
            box-shadow:
                2px 2px 7px rgba(0,0,0,0.12),
                -1px -1px 1px rgba(255, 255, 255, 0.618);
        }

        .user-bubble {
            border-bottom-right-radius: 6px;
            color: #707070;
        }

        .bot-bubble {
            border-bottom-left-radius: 6px;
            color: #00836d;
        }

        .chat-bubble:active {
            box-shadow:
                inset 4px 4px 10px rgba(0,0,0,0.15),
                inset -4px -4px 10px rgba(255,255,255,0.9);
        }

        /* ===== input ===== */
        input {
            background: #e9ecef !important;
            border-radius: 16px !important;
            border: none !important;
            box-shadow:
                inset 6px 6px 12px rgba(0,0,0,0.12),
                inset -6px -6px 12px rgba(255,255,255,0.8);
            padding: 12px;
        }

        input:focus {
            outline: none;
        }

        /* ===== Send button ===== */
        #send-btn {
            background: #01584a;
            border-radius: 16px;
            box-shadow:
                6px 6px 14px rgba(0,0,0,0.15),
                -6px -6px 14px rgba(255,255,255,0.8);
            color: #ffffff;
            font-weight: 600;
        }

        #send-btn:active {
            box-shadow:
                inset 4px 4px 10px rgba(0,0,0,0.15),
                inset -4px -4px 10px rgba(255,255,255,0.9);
        }

        /* ===== Cat images ===== */
        .cat-image-container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                8px 8px 20px rgba(0,0,0,0.15),
                -8px -8px 20px rgba(255,255,255,0.8);
        }

        /* ===== モーダル ===== */
        #settings-modal {
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(6px);
        }

        #settings-modal > div {
            background: #e9ecef;
            border-radius: 24px;
            box-shadow:
                12px 12px 30px rgba(0,0,0,0.2),
                -12px -12px 30px rgba(255,255,255,0.9);
            border: none;
        }

        /* ===== ローディング ===== */
        .loading-dot {
            background: #666;
        }

        /* ===== スクロール ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>


</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-lg bg-white shadow-2xl rounded-2xl flex flex-col h-[90vh] relative text-gray-800">
        
        <header class="p-5 border-b border-gray-100 bg-white rounded-t-2xl text-center relative">
            <button id="open-settings" class="absolute right-4 top-4 p-2 text-gray-400 hover:text-cyan-600 transition transform active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>

            <h1 class="text-3xl font-bold text-gray-800">ちょっとボット</h1>
            <p class="text-sm text-gray-500 mb-4">Choose a character and start chatting.</p>
            
            <div id="style-selector" class="flex flex-wrap justify-center gap-2">
                <button data-style="Degawa" title="出川っぽい。口癖の「やばいよやばいよー」をランダムに放り込んでくるのが特徴。" class="style-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-semibold hover:bg-yellow-200 transition transform hover:scale-105 active:scale-95">出川</button>
                <button data-style="Koume" title="某大夫的なチックショーが決めゼリフ。紳士的にってプログラムしたはずなんだけど、若干方向がズレている感が拭えない。" class="style-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-semibold hover:bg-sky-200 transition transform hover:scale-105 active:scale-95">小梅</button>
                <button data-style="Zamasu" title="スネちゃまのママ的なマダム。優雅に解決にならない解決策を提案してくれる。〇〇〇の絵文字付き⭐️" class="style-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-semibold hover:bg-red-200 transition transform hover:scale-105 active:scale-95">ざます</button>
                <button data-style="Ossan" title="おっさん。上がる年齢に反比例して短くなる体感時間に事あるごとに驚く。常に昔話(誇張と嘘含む)に持っていく会話泥棒。コレステロール値高め。" class="style-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-semibold hover:bg-green-200 transition transform hover:scale-105 active:scale-95">おっさん</button>
                <button data-style="Chūni" title="厨二・中二。見た目も頭も中二真っ只中。激情と刹那と黒歴史でできている。親兄弟は至ってまとも。若さに任せて突っ走るが意外に博識。" class="style-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-semibold hover:bg-purple-200 transition transform hover:scale-105 active:scale-95">厨二</button>
                <button data-style="Buri-chan" title="アイドル。キラキラのキュルンキュルンだが、時々めっちゃ毒吐く。自分が世界一可愛いと信じて疑わない。なおブリトニー・スピアーズではない。" class="style-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-semibold hover:bg-fuchsia-200 transition transform hover:scale-105 active:scale-95">ブリちゃん</button>
                <button data-style="Neko" title="ねこ。かわいい姿を365日24時間見せつけてくる。ランダムに10回に1回の割合で返事してくれる。" class="style-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-semibold hover:bg-amber-400 transition transform hover:scale-105 active:scale-95">ねこ</button>
                <button data-style="Wakame" title="三陸沖の純日本産ワカメ。MENSA会員。主に海中からのワカメ視点で、鋭く時事関連にも切り込む。" class="style-btn bg-gray-100 text-gray-700 px-4 py-2 rounded-full text-sm font-semibold hover:bg-lime-300 transition transform hover:scale-105 active:scale-95">ワカメ</button>
            </div>
            <p id="selected-style-display" class="mt-3 text-center text-sm font-medium text-gray-600">Selected Style: <span class="font-bold text-gray-500">None</span></p>
        </header>

        <main id="chat-transcript" class="flex-grow p-4 overflow-y-auto space-y-3 bg-gray-50">
            <div id="api-key-warning" class="hidden bg-orange-100 text-orange-700 p-4 rounded-xl text-sm mb-4 text-center border border-orange-200">
                ⚠️ <b>APIキーが設定されていません</b><br>右上の設定ボタンからGemini APIキーを入力してください。
            </div>
            <div class="text-center text-gray-400 italic mt-4 p-4">気分に合わせてお好きなペルソナを選択してみましょう</div>
        </main>

        <footer class="p-4 border-t border-gray-100 bg-white">
            <div class="flex space-x-3">
                <input type="text" id="user-input" placeholder="Ask your question..." class="flex-grow p-3 border border-gray-300 rounded-xl focus:ring-cyan-500 focus:border-cyan-500 disabled:bg-gray-100 transition shadow-sm" disabled>
                <button id="send-btn" class="bg-cyan-600 text-white w-24 rounded-xl hover:bg-cyan-700 transition disabled:opacity-50 font-semibold shadow-md active:shadow-lg transform active:scale-95" disabled>Send</button>
            </div>
        </footer>

        <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
            <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 border border-gray-100">
                <h2 class="text-xl font-bold mb-4">Settings</h2>
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Gemini API Key</label>
                    <input type="password" id="api-key-input" placeholder="AIza..." class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-cyan-500 outline-none transition">
                    <p class="text-[10px] text-gray-400 mt-2 leading-relaxed italic">※キーはブラウザにのみ保存され、リクエスト時以外に共有されることはありません。</p>
                </div>
                <div class="flex justify-between items-center pt-2">
                    <button id="clear-key" class="text-xs text-red-500 hover:text-red-700 font-medium">キーを削除</button>
                    <div class="flex gap-2">
                        <button id="close-settings" class="px-4 py-2 text-sm font-semibold text-gray-500 hover:bg-gray-100 rounded-xl transition">閉じる</button>
                        <button id="save-settings" class="px-6 py-2 text-sm font-bold text-white bg-cyan-600 hover:bg-cyan-700 rounded-xl shadow-sm transition">保存</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PROXY_URL = '/api/generate'; 
        let savedApiKey = localStorage.getItem('GEMINI_API_KEY') || '';

        const chatTranscript = document.getElementById('chat-transcript');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const styleButtons = document.querySelectorAll('.style-btn');
        const selectedStyleDisplay = document.getElementById('selected-style-display').querySelector('span');
        const modal = document.getElementById('settings-modal');
        const openSettingsBtn = document.getElementById('open-settings');
        const closeSettingsBtn = document.getElementById('close-settings');
        const saveSettingsBtn = document.getElementById('save-settings');
        const clearKeyBtn = document.getElementById('clear-key');
        const apiKeyInput = document.getElementById('api-key-input');
        const apiKeyWarning = document.getElementById('api-key-warning');

        let selectedStyle = null;
        let isSending = false;

        // --- プロンプト ---
        const SYSTEM_INSTRUCTIONS = {
            'Degawa': { voice: 'Degawa', systemInstruction: `You are the persona of Japanese comedian Tetsuro Degawa. Respond to the user's input with a male, casual, often flustered, and slightly confused tone. Your speech must sound like an urgent reaction to the user's message. CRITICAL RULE: Your response MUST always end with the phrase: "やばいよやばいよー". You may also randomly insert this phrase into the middle of your response if it fits the frantic tone. Do not use any emojis.` },
            'Koume': { voice: 'Koume', systemInstruction: `You are the male comedian Koume Tayu. Respond to the user's input with a theatrical, dramatic, slightly sad, or overly formal style. Use male language (e.g., 〜だぜ, 〜だよ) and strictly AVOID feminine phrasing (e.g., 〜わね, 〜ざます). Your tone should set up a sense of minor misfortune or inevitable defeat. CRITICAL RULE: Your response MUST end with the phrase: "チックショー！". This phrase must appear ONLY ONCE at the very end of your final response. Do not use any emojis.` },
            'Zamasu': { voice: 'Zamasu', systemInstruction: `You are the mother of Suneo Honekawa (Suneo's Mom), adopting an overly exaggerated 'madam' tone. Speak with a refined, highly composed, slightly mysterious, and authoritative style. RULE: Do not feel obligated to strictly end every sentence with 'ざます'; only use it when it sounds natural to maintain the exaggerated persona. CRITICAL RULE: You MUST append the special emoji marker: "╰⋃╯" at the end of every sentence in your response.` },
            'Ossan': { voice: 'Ossan', systemInstruction: `あなたは、典型的な中年の日本人男性（「おっさん」）のペルソナです。口調は概ね少し見下した感じか、過度に自慢げです。応答は一切の英単語、開発者向けの注釈、記号、またはコード的な要素を含まず、完全に日本語の散文のみで行ってください。あなたは常に会話を遮って「古き良き時代」の話を持ち出したり、自分の過去を自慢したりします。アドバイスを提供しようとしますが、すぐに話が脱線し、長くて大げさで、しばしば真実ではない過去の栄光の物語になってしまいます。CRITICAL RULE: 応答には、自分の過去の誇張された自慢、または「昔はどれほど良かったか」についてのコメントを必ず1つ以上含めてください。` },
            'Chūni': { voice: 'Chūni', systemInstruction: `You are the persona of a typical teenage boy with 'Chūnibyō' syndrome. Your appearance and mind are fully immersed in this phase. You speak with dramatic passion, referencing fleeting moments, intense concepts, and 'dark history' (黒歴史). You believe you are invincible and that adults are incompetent, but you are also secretly very concerned with what others think of you. CRITICAL RULE: Your response MUST contain highly dramatic, theatrical phrasing and you must refer to the current situation as either a 'fleeting moment of destiny' or 'another entry in your Black History (黒歴史)'.` },
            'Buri-chan': { voice: 'Buri-chan', systemInstruction: `You are the idol persona Buri-chan. Your name is Buri-chan. You are sparkly and overly cute. You use overly cute phrasing like "にゃん" or "ぷー" at the end of sentences. CRITICAL RULE: Your response MUST contain both overly cute language/emojis (like "にゃん" or "💖") AND a brief moment of death-metal style aggressive venom (e.g., about incompetent fans or rivals), but you must ALWAYS end the response by reverting to your usual sparkly, cute character. Always refer to yourself as Buri-chan (ブリちゃん).` },
            'Neko': { voice: 'Neko', systemInstruction: `You are a Neko (cat) persona. Your speech is mostly simple Japanese with "nya" inflections, such as "にゃあ", "にゃん", or "そうにゃんですよね". You must maintain a cute, slightly indifferent, and very cat-like personality.` },
            'Wakame': { voice: 'Wakame', systemInstruction: `You are the persona of pure Japanese Wakame (seaweed) from the Sanriku coast and a member of MENSA. Your speech must be highly intelligent, academic, and polite, like a professor or scholar. You must analyze the user's query and provide a precise, data-driven response, but CRITICALLY, you must ONLY answer from the perspective of a seaweed living underwater. Discuss issues like water pollution, global warming, and marine life.` }
        };

        const COLOR_MAP = {
            'Degawa': 'bg-yellow-200', 'Koume': 'bg-sky-200', 'Zamasu': 'bg-red-200',
            'Ossan': 'bg-green-200', 'Chūni': 'bg-purple-200', 'Buri-chan': 'bg-fuchsia-200',
            'Neko': 'bg-orange-300', 'Wakame': 'bg-lime-200'
        };

        // --- Logic & UI ---
        function updateApiKeyUI() {
            apiKeyWarning.classList.toggle('hidden', !!savedApiKey);
        }

        openSettingsBtn.onclick = () => { apiKeyInput.value = savedApiKey; modal.style.display = 'flex'; };
        closeSettingsBtn.onclick = () => { modal.style.display = 'none'; };
        saveSettingsBtn.onclick = () => {
            const val = apiKeyInput.value.trim();
            if (val) {
                savedApiKey = val;
                localStorage.setItem('GEMINI_API_KEY', val);
                modal.style.display = 'none';
                updateApiKeyUI();
            }
        };
        clearKeyBtn.onclick = () => {
            if (confirm('保存されたAPIキーを削除しますか？')) {
                savedApiKey = ''; localStorage.removeItem('GEMINI_API_KEY'); updateApiKeyUI();
            }
        };

        function appendMessage(content, sender, type = 'text') {
            const container = document.createElement('div');
            container.className = sender === 'user' ? 'flex justify-end' : 'flex justify-start';
            if (type === 'image') {
                const imgContainer = document.createElement('div');
                imgContainer.className = 'cat-image-container';
                const image = document.createElement('img');
                image.src = content;
                image.className = 'cat-image';
                image.onerror = function() { this.src = `https://placehold.co/300x200?text=Cat+Failed`; }
                imgContainer.appendChild(image);
                container.appendChild(imgContainer);
            } else {
                const bubble = document.createElement('div');
                bubble.className = `chat-bubble ${sender === 'user' ? 'user-bubble' : 'bot-bubble'}`;
                bubble.textContent = content;
                container.appendChild(bubble);
            }
            chatTranscript.appendChild(container);
            chatTranscript.scrollTop = chatTranscript.scrollHeight;
        }

        async function getBotResponse(userMessage, style) {
            if (!savedApiKey) return { type: 'text', content: "⚠️ APIキーを設定してください。" };
            const styleConfig = SYSTEM_INSTRUCTIONS[style];
            try {
                const res = await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-gemini-api-key': savedApiKey },
                    body: JSON.stringify({ userMessage, styleInstruction: styleConfig.systemInstruction })
                });
                const result = await res.json();
                if (res.ok && result.text) return { type: 'text', content: result.text.trim() };
                return { type: 'text', content: `ERROR: ${result.error || '通信エラー'}` };
            } catch (e) { return { type: 'text', content: "ERROR: Connection Failed" }; }
        }

        async function getNekoResponse() {
            // 1/10 喋る、9/10 画像 
            if (Math.random() < 0.1) {
                const phrases = ['にゃー','遊ぼう','ゴロゴロ…','？','スヤスヤ…','ねむい','ごはん…'];
                return { type: 'text', content: phrases[Math.floor(Math.random() * phrases.length)] };
            }
            return { type: 'image', content: `https://cataas.com/cat?r=${Math.floor(Math.random() * 1000000)}` };
        }

        async function handleSendMessage() {
            const msg = userInput.value.trim();
            if (!msg || !selectedStyle || isSending) return;
            userInput.value = '';
            isSending = true; userInput.disabled = true;
            appendMessage(msg, 'user');
            
            const loading = document.createElement('div');
            loading.className = 'flex justify-start';
            loading.innerHTML = `<div class="chat-bubble bot-bubble flex space-x-1 items-center"><span class="loading-dot w-2 h-2 bg-gray-400 rounded-full"></span><span class="loading-dot w-2 h-2 bg-gray-400 rounded-full"></span><span class="loading-dot w-2 h-2 bg-gray-400 rounded-full"></span></div>`;
            chatTranscript.appendChild(loading);
            chatTranscript.scrollTop = chatTranscript.scrollHeight;

            try {
                const res = (selectedStyle === 'Neko') ? await getNekoResponse() : await getBotResponse(msg, selectedStyle);
                loading.remove();
                appendMessage(res.content, 'bot', res.type);
            } catch (e) { loading.remove(); appendMessage("An error occurred.", 'bot'); }
            finally { isSending = false; userInput.disabled = false; userInput.focus(); }
        }

        styleButtons.forEach(button => {
            button.onclick = (e) => {
                if (isSending) return;
                const style = e.currentTarget.dataset.style;
                styleButtons.forEach(btn => {
                    btn.classList.remove('ring-4', 'ring-offset-2', 'ring-cyan-500', 'text-white', ...Object.values(COLOR_MAP));
                    btn.classList.add('bg-gray-100', 'text-gray-700');
                });
                e.currentTarget.classList.add('ring-4', 'ring-offset-2', 'ring-cyan-500', 'text-white', COLOR_MAP[style]);
                e.currentTarget.classList.remove('bg-gray-100', 'text-gray-700');
                selectedStyle = style;
                selectedStyleDisplay.textContent = e.currentTarget.textContent;
                userInput.disabled = false;
                userInput.focus();
                chatTranscript.innerHTML = `<div class="text-center text-gray-400 italic mt-4 p-4"><span class="font-bold">${e.currentTarget.textContent}</span>とチャットを開始しました。</div>`;
            };
        });

        sendBtn.onclick = handleSendMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') handleSendMessage(); };
        updateApiKeyUI();
    </script>
</body>
</html>
